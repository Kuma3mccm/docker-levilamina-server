name: Build and Push Docker Image (日本語対応版)

on:
  push:
    branches: [ main ]
    paths:
      - 'wine/**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: 小文字ユーザー名を設定
      run: |
        echo "REGISTRY_USER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ env.REGISTRY_USER }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./wine
        file: ./wine/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ env.REGISTRY_USER }}/docker-levilamina-server:latest-wine-jp
          ghcr.io/${{ env.REGISTRY_USER }}/docker-levilamina-server:jp
