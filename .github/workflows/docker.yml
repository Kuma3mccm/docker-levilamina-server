name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths:
      - 'wine/**'
  pull_request:
    paths:
      - 'wine/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push wine-jp image
      uses: docker/build-push-action@v5
      with:
        context: ./wine
        file: ./wine/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/docker-levilamina-server:latest-wine-jp
          ghcr.io/${{ github.repository_owner }}/docker-levilamina-server:jp
